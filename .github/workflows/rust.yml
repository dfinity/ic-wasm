name: Rust
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # rust-cache keys on the installed toolchain's version; the runner image's
      # bundled `stable` drifts on every image update, moving the key and causing
      # cache misses. Remove it so the toolchain comes from rust-toolchain.toml via
      # rustup instead, which tracks upstream stable (~6-week release cadence).
      - name: Remove the runner's bundled Rust toolchain
        run: rustup toolchain remove stable 2>/dev/null || true

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          cache-bin: false

      - name: Install cargo-sort
        uses: taiki-e/install-action@e9e8e031bcd90cdbe8ac6bb1d376f8596e587fbf # v2.70.2
        with:
          tool: cargo-sort

      - name: cargo sort
        run: cargo sort --check
      - name: Build
        run: cargo build --all-features
      - name: Run tests (default features)
        run: cargo test
      - name: Run tests (all features)
        run: cargo test --all-features
      - name: fmt
        run: cargo fmt -v -- --check
      - name: lint
        run: cargo clippy --tests -- -D clippy::all
      - name: doc
        run: cargo doc
